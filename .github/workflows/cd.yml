          for digest_file in *; do
            SOURCES="$SOURCES ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.THEME_IMAGE_NAME }}@${digest_file}"
          done

          docker buildx imagetools create $TAG_ARGS $SOURCES

