          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Create manifest list
        working-directory: /tmp/digests/auth9-keycloak-events
        run: |
          TAG_ARGS=""
          while IFS= read -r tag; do
