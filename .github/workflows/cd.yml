          done

          docker buildx imagetools create $TAG_ARGS $SOURCES

  # ==================== Generate Summary ====================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [merge-core, merge-portal, merge-theme, merge-events]
    permissions:
      contents: read

    steps:
      - name: Generate deployment summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Docker Images Built Successfully
          
          Commit: `${{ github.sha }}`
          Branch: `${{ github.ref_name }}`
          
          ### auth9-core
          
          ```
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.CORE_IMAGE_NAME }}:${SHORT_SHA}
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.CORE_IMAGE_NAME }}:latest
          ```
          
          ### auth9-portal

          ```
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.PORTAL_IMAGE_NAME }}:${SHORT_SHA}
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.PORTAL_IMAGE_NAME }}:latest
          ```

          ### auth9-keycloak-theme

          ```
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.THEME_IMAGE_NAME }}:${SHORT_SHA}
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.THEME_IMAGE_NAME }}:latest
          ```

          ### auth9-keycloak-events

          ```
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.EVENTS_IMAGE_NAME }}:${SHORT_SHA}
          ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.EVENTS_IMAGE_NAME }}:latest
          ```

          ### Quick Copy (with commit SHA)

          | Component | Image |
          |-----------|-------|
          | auth9-core | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.CORE_IMAGE_NAME }}:${SHORT_SHA}` |
          | auth9-portal | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.PORTAL_IMAGE_NAME }}:${SHORT_SHA}` |
          | auth9-keycloak-theme | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.THEME_IMAGE_NAME }}:${SHORT_SHA}` |
          | auth9-keycloak-events | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.EVENTS_IMAGE_NAME }}:${SHORT_SHA}` |

          ### Quick Copy (latest)

          | Component | Image |
          |-----------|-------|
          | auth9-core | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.CORE_IMAGE_NAME }}:latest` |
          | auth9-portal | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.PORTAL_IMAGE_NAME }}:latest` |
          | auth9-keycloak-theme | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.THEME_IMAGE_NAME }}:latest` |
          | auth9-keycloak-events | `ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.EVENTS_IMAGE_NAME }}:latest` |

          ### Architectures

          These images are published as multi-arch manifests for:

          - `linux/amd64`
          - `linux/arm64`

          ---

          To deploy, run:
          ```bash
          ./deploy/deploy.sh
          ```
          EOF
          
          # Substitute variables in the summary
          sed -i "s/\${SHORT_SHA}/${SHORT_SHA}/g" $GITHUB_STEP_SUMMARY
